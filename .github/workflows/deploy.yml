name: Deploy Caldwell Proxy Worker
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Test Cloudflare Token
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Testing token..."
          curl -s -X GET "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json"
          echo ""
          echo "Testing account access..."
          curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/scripts" \
            -H "Authorization: Bearer $CF_TOKEN" | head -c 500
