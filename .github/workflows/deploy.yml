name: Deploy Caldwell Proxy Worker
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy Worker Script via Cloudflare API
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Deploying worker script..."
          
          # Upload the worker script
          RESULT=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/scripts/caldwell-brief-proxy" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -F "metadata={\"main_module\":\"worker.js\",\"bindings\":[{\"type\":\"secret_text\",\"name\":\"ANTHROPIC_API_KEY\",\"text\":\"$ANTHROPIC_KEY\"}]};type=application/json" \
            -F "worker.js=@worker.js;type=application/javascript+module")
          
          echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Success:', d.get('success'), d.get('errors',''))"
          
          # Enable workers.dev subdomain
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/scripts/caldwell-brief-proxy/subdomain" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"enabled":true}'
            
          echo "Worker URL: https://caldwell-brief-proxy.$CF_ACCOUNT.workers.dev"
