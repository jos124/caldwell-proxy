name: Setup Workers Subdomain
on:
  workflow_dispatch:
    inputs:
      subdomain:
        description: 'Desired subdomain (e.g. caldwellbriefs)'
        required: true
        default: 'caldwellbriefs'

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Workers subdomain
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Creating subdomain: ${{ github.event.inputs.subdomain }}"
          RESULT=$(curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/subdomain" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"subdomain\": \"${{ github.event.inputs.subdomain }}\"}")
          echo "Result: $RESULT"
          SUCCESS=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('success'))")
          SUBDOMAIN=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print((d.get('result') or {}).get('subdomain','FAILED'))")
          echo "Success: $SUCCESS"
          echo "Subdomain: $SUBDOMAIN"
          echo "$SUBDOMAIN" > subdomain.txt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add subdomain.txt
          git diff --staged --quiet || git commit -m "subdomain set: $SUBDOMAIN"
          git push
