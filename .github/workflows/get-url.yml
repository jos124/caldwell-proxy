name: Get Worker URL
on:
  workflow_dispatch:

jobs:
  get-url:
    runs-on: ubuntu-latest
    steps:
      - name: Get Account Subdomain and Test Worker
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Account subdomain:"
          SUBDOMAIN=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/subdomain" \
            -H "Authorization: Bearer $CF_TOKEN" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('result',{}).get('subdomain','NOT_FOUND'))")
          echo "Subdomain: $SUBDOMAIN"
          echo "Worker URL: https://caldwell-brief-proxy.$SUBDOMAIN.workers.dev"
          
          echo ""
          echo "Testing worker..."
          curl -s -o /dev/null -w "HTTP Status: %{http_code}" "https://caldwell-brief-proxy.$SUBDOMAIN.workers.dev"
