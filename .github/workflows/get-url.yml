name: Get Worker URL
on:
  workflow_dispatch:

jobs:
  get-url:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Get Subdomain and Save
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESULT=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/subdomain" \
            -H "Authorization: Bearer $CF_TOKEN")
          SUBDOMAIN=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result'); print(r.get('subdomain','') if r else '')" 2>/dev/null)
          
          echo "WORKER_URL=https://caldwell-brief-proxy.$SUBDOMAIN.workers.dev" > worker-url.txt
          cat worker-url.txt
          
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add worker-url.txt
          git commit -m "Save worker URL: $SUBDOMAIN"
          git push
