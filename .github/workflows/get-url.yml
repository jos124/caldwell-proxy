name: Get Worker URL
on:
  workflow_dispatch:

jobs:
  get-url:
    runs-on: ubuntu-latest
    steps:
      - name: Get Subdomain and Output URL
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          RESULT=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/subdomain" \
            -H "Authorization: Bearer $CF_TOKEN")
          echo "Raw result: $RESULT"
          SUBDOMAIN=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result'); print(r.get('subdomain','') if r else 'NONE')" 2>/dev/null || echo "parse_error")
          echo "SUBDOMAIN=$SUBDOMAIN"
          echo "## Worker URL" >> $GITHUB_STEP_SUMMARY
          echo "https://caldwell-brief-proxy.$SUBDOMAIN.workers.dev" >> $GITHUB_STEP_SUMMARY
