name: Get Worker URL
on:
  workflow_dispatch:

jobs:
  get-url:
    runs-on: ubuntu-latest
    steps:
      - name: Get Worker Info
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "=== Worker subdomain ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/subdomain" \
            -H "Authorization: Bearer $CF_TOKEN" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Subdomain:', d.get('result',{}).get('subdomain',''))"
          
          echo "=== Worker script details ==="
          curl -s "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/scripts/caldwell-brief-proxy" \
            -H "Authorization: Bearer $CF_TOKEN" -o /dev/null -w "Status: %{http_code}\n"
