name: Get Worker URL
on:
  workflow_dispatch:

jobs:
  get-url:
    runs-on: ubuntu-latest
    steps:
      - name: Get Subdomain
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          RESULT=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/subdomain" \
            -H "Authorization: Bearer $CF_TOKEN")
          echo "Raw API result: $RESULT"
          SUBDOMAIN=$(echo "$RESULT" | python3 -c "
import sys, json
d = json.load(sys.stdin)
r = d.get('result', {})
s = r.get('subdomain', '') if r else ''
print(s)
")
          echo "Subdomain: [$SUBDOMAIN]"
          echo "Worker URL: https://caldwell-brief-proxy.$SUBDOMAIN.workers.dev"
          mkdir -p /tmp/output
          echo "https://caldwell-brief-proxy.$SUBDOMAIN.workers.dev" > /tmp/output/url.txt

      - uses: actions/upload-artifact@v4
        with:
          name: worker-url
          path: /tmp/output/url.txt
