name: Get Worker URL
on:
  workflow_dispatch:

jobs:
  get-url:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get subdomain and write to file
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          RESULT=$(curl -s "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/subdomain" \
            -H "Authorization: Bearer $CF_TOKEN")
          echo "Raw: $RESULT"
          SUBDOMAIN=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print((d.get('result') or {}).get('subdomain','NONE'))")
          echo "$SUBDOMAIN" > subdomain.txt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add subdomain.txt
          git diff --staged --quiet || git commit -m "subdomain: $SUBDOMAIN"
          git push
